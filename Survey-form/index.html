<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HTML Learning Journey Survey</title>
  </head>

  <body>
    <h1 id="title">HTML Learning Journey Survey</h1>

    <p id="description">
      Thank you for taking this survey! We would love to know about your HTML learning experience.
    </p>

    <form id="survey-form">

      <!-- Name -->
      <label id="name-label" for="name">Full Name</label><br>
      <input
        id="name"
        type="text"
        placeholder="Enter your full name"
        required
      >

      <br><br>

      <!-- Email -->
      <label id="email-label" for="email">Email Address</label><br>
      <input
        id="email"
        type="email"
        placeholder="Enter your email"
        required
      >

      <br><br>

      <!-- Age -->
      <label id="number-label" for="number">Age</label><br>
      <input
        id="number"
        type="number"
        placeholder="Enter your age"
        min="10"
        max="100"
        required
      >

      <br><br>

      <!-- Favorite Topic -->
      <label for="dropdown">Which HTML topic have you enjoyed the most?</label>
      <br>

      <select id="dropdown">
        <option selected disabled>Select one</option>
        <option value="basics">HTML Basics</option>
        <option value="tables">Tables</option>
        <option value="forms">Forms</option>
        <option value="semantic">Semantic HTML</option>
        <option value="all">I enjoyed all of them!</option>
      </select>

      <br><br>

      <!-- Confidence -->
      <p>How confident do you feel using HTML?</p>

      <input
        id="beginner"
        type="radio"
        name="confidence"
        value="beginner"
      >
      <label for="beginner">Beginner</label>

      <br>

      <input
        id="improving"
        type="radio"
        name="confidence"
        value="improving"
      >
      <label for="improving">Improving</label>

      <br>

      <input
        id="confident"
        type="radio"
        name="confidence"
        value="confident"
      >
      <label for="confident">Confident</label>

      <br>

      <input
        id="expert"
        type="radio"
        name="confidence"
        value="expert"
      >
      <label for="expert">Very Confident</label>

      <br><br>

      <!-- Learned Elements -->
      <p>Which HTML elements have you practiced?</p>

      <input
        id="headings"
        type="checkbox"
        value="headings"
      >
      <label for="headings">Headings</label>

      <br>

      <input
        id="paragraphs"
        type="checkbox"
        value="paragraphs"
      >
      <label for="paragraphs">Paragraphs</label>

      <br>

      <input
        id="tables"
        type="checkbox"
        value="tables"
      >
      <label for="tables">Tables</label>

      <br>

      <input
        id="forms"
        type="checkbox"
        value="forms"
      >
      <label for="forms">Forms</label>

      <br>

      <input
        id="labels"
        type="checkbox"
        value="labels"
      >
      <label for="labels">Labels</label>

      <br>

      <input
        id="inputs"
        type="checkbox"
        value="inputs"
      >
      <label for="inputs">Inputs</label>

      <br>

      <input
        id="select"
        type="checkbox"
        value="select"
      >
      <label for="select">Select Menu</label>

      <br>

      <input
        id="radio"
        type="checkbox"
        value="radio"
      >
      <label for="radio">Radio Buttons</label>

      <br>

      <input
        id="checkbox"
        type="checkbox"
        value="checkbox"
      >
      <label for="checkbox">Checkboxes</label>

      <br>

      <input
        id="textarea"
        type="checkbox"
        value="textarea"
      >
      <label for="textarea">Textarea</label>

      <br>

      <input
        id="button"
        type="checkbox"
        value="button"
      >
      <label for="button">Buttons</label>

      <br><br>

      <!-- Practice Hours -->
      <label for="practice-hours">
        How many hours do you practice HTML each week?
      </label>

      <br>

      <input
        id="practice-hours"
        type="number"
        placeholder="Hours"
        min="0"
        max="100"
      >

      <br><br>

      <!-- Recommendation -->
      <p>Would you recommend learning HTML to others?</p>

      <input
        id="yes"
        type="radio"
        name="recommend"
        value="yes"
      >
      <label for="yes">Yes</label>

      <br>

      <input
        id="maybe"
        type="radio"
        name="recommend"
        value="maybe"
      >
      <label for="maybe">Maybe</label>

      <br>

      <input
        id="no"
        type="radio"
        name="recommend"
        value="no"
      >
      <label for="no">No</label>

      <br><br>

      <!-- Learning Resource -->
      <label for="resource">
        Which resource are you using to learn HTML?
      </label>

      <br>

      <select id="resource">
        <option selected disabled>Select one</option>
        <option value="fcc">freeCodeCamp</option>
        <option value="youtube">YouTube</option>
        <option value="mdn">MDN Docs</option>
        <option value="books">Books</option>
        <option value="college">School / College</option>
        <option value="other">Other</option>
      </select>

      <br><br>

      <!-- Dream Project -->
      <label for="project">
        What website would you like to build after learning HTML?
      </label>

      <br>

      <textarea
        id="project"
        rows="5"
        cols="40"
        placeholder="Describe your dream project..."
      ></textarea>

      <br><br>

      <!-- Suggestions -->
      <label for="comments">
        Any suggestions or feedback about learning HTML?
      </label>

      <br>

      <textarea
        id="comments"
        rows="5"
        cols="40"
        placeholder="Share your thoughts..."
      ></textarea>

      <br><br>

      <button id="submit" type="submit">
        Submit Survey
      </button>

    </form>

  </body>
</html>
