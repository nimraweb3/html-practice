<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
</head>
<body>

  <h1>Checkout</h1>

  <!-- Cart Section -->
  <section>
    <h2>Your Cart</h2>

    <img
      src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg"
      alt="Blue cube product"
      width="200"
    >

    <h3>Blue Cube</h3>

    <p><strong>Price:</strong> $29.99</p>
    <p><strong>Quantity:</strong> 1</p>

    <hr>

    <p><strong>Subtotal:</strong> $29.99</p>
    <p><strong>Shipping:</strong> $5.00</p>
    <p><strong>Tax:</strong> $2.40</p>

    <hr>

    <p><strong>Total:</strong> $37.39</p>
  </section>

  <!-- Payment Section -->
  <section>
    <h2>Payment Information</h2>

    <form action="#">
      <div>
        <label for="card-name">
          Cardholder Name
          <span aria-hidden="true">*</span>
        </label>
        <br>
        <input
          type="text"
          id="card-name"
          name="card-name"
          required
        >
      </div>

      <br>

      <div>
        <label for="card-number">
          Card Number
          <span aria-hidden="true">*</span>
        </label>
        <br>
        <input
          type="text"
          id="card-number"
          name="card-number"
          aria-describedby="card-number-help"
          required
        >
        <p id="card-number-help">
          Enter your 16-digit card number without spaces or dashes.
        </p>
      </div>

      <br>

      <div>
        <label for="expiry-date">
          Expiration Date
          <span aria-hidden="true">*</span>
        </label>
        <br>
        <input
          type="month"
          id="expiry-date"
          name="expiry-date"
          required
        >
      </div>

      <br>

      <div>
        <label for="cvv">
          CVV
          <span aria-hidden="true">*</span>
        </label>
        <br>
        <input
          type="password"
          id="cvv"
          name="cvv"
          maxlength="4"
          required
        >
      </div>

      <br>

      <input type="submit" value="Complete Purchase">
    </form>
  </section>

</body>
</html>
