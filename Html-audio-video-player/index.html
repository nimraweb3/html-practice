<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="description" content="An HTML audio and video player example.">
  <title>HTML Audio and Video Player</title>
</head>

<body>

  <h1>My Media Player</h1>

  <section>
    <h2>What Is the Map Method?</h2>

    <video width="640" controls>
      <source
        src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4"
        type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </section>

  <section>
    <h2>Sailing Away</h2>

    <audio
      controls
      loop
      src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3">
      Your browser does not support the audio element.
    </audio>
  </section>

</body>

</html>
